model_type: XGBoost classifier
model_name: Acme Fraud Detection Model
version: "2.1"
date: "2025-12-01"
provider: Acme Financial Services GmbH

intended_use: Automated fraud detection for credit card transactions in EU financial markets
limitations:
  - Not validated for cryptocurrency transactions
  - Accuracy degrades outside EU geographic region
  - Requires human review for transactions over €10,000

training_data:
  sources:
    - EU banking consortium anonymised transaction data (2019-2024)
    - Synthetic fraud scenarios generated by red-team
  size: 45M transactions
  time_period: 2019-2024

dataset_info:
  representativeness: Covers 12 EU member states, all major card networks
  special_category_data: false

metrics:
  precision: 0.9823
  recall: 0.9641
  f1: 0.9731
  auc_roc: 0.9956
  false_positive_rate: 0.0177

model_performance:
  benchmark: EU Banking Fraud Dataset Q4 2024
  accuracy: 0.9843

model_architecture: Gradient-boosted tree ensemble with 500 estimators, max depth 6

standards:
  - ISO/IEC 42001:2023
  - PCI DSS 4.0
  - EBA Guidelines on ML/AI in Banking
