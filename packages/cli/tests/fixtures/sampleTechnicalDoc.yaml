system_name: Acme Fraud Detection Model
version: "2.1"
date: "2025-12-01"

general_description: >
  XGBoost-based fraud detection system for real-time credit card transaction scoring.
  Processes 50,000 transactions per second with sub-100ms latency.

intended_purpose: Automated fraud detection for EU credit card transactions

development_process: >
  Model trained on 45M anonymised transactions. Monthly retraining pipeline.
  Feature engineering by domain experts. Validation by independent data science team.

training_methodology: Gradient boosted trees with k-fold cross-validation

performance_metrics:
  precision: 0.9823
  recall: 0.9641
  auc_roc: 0.9956
  false_positive_rate: 0.0177

monitoring: Real-time dashboards with drift detection alerts. Monthly model health reviews.

robustness:
  adversarial_testing: Conducted quarterly by internal red team
  distribution_shift: Monitored via PSI metric; alert threshold 0.2

accuracy: 0.9843

cybersecurity:
  pen_testing: Annual third-party penetration test
  access_control: Role-based with MFA for all model endpoints

human_oversight_measures: >
  All decisions above €10,000 require human review.
  Override queue accessible to fraud analysts 24/7.
  Full explainability output available via /api/explain.

limitations:
  - Not validated for cryptocurrency transactions
  - Requires revalidation if deployed outside EU

standards:
  - ISO/IEC 42001:2023
  - PCI DSS 4.0
  - EBA ML/AI Guidelines

post_market: >
  Monthly bias audit. Quarterly robustness evaluation.
  Incident reports filed within 24h of serious incidents.

changes: v2.1 adds emerging risk module and fairness constraints

compliance_declaration: >
  This system has been assessed against EU AI Act (2024/1689) requirements
  for high-risk AI systems under Article 10 (financial services).

human_oversight: Mandatory human review for high-stakes decisions

fallback_plan: >
  If model availability drops below 99.5%, routing switches to rule-based fallback
  system automatically. Human review queue activated for all transactions.
