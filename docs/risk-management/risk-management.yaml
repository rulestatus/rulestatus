# Risk Management System — EU AI Act Article 9(1)(2)(3)
# Note: Rulestatus CLI v1.0 is classified as limited-risk under the EU AI Act
# (.rulestatus.yaml: risk_level: limited-risk). Article 9 obligations apply to
# high-risk AI systems (Annex III). This document is maintained for completeness
# and in case the risk classification is revisited.

system_name: "Rulestatus CLI v1.0"

intended_use: >
  CLI tool that checks whether AI system documentation and configuration satisfies
  the evidence requirements of the EU AI Act, ISO/IEC 42001, NIST AI RMF 1.0,
  and Colorado SB 24-205. Outputs evidence readiness reports for use in audits
  and enterprise security reviews. Not a high-risk AI system under Annex III.

use_cases:
  - "Developer running rulestatus run in a CI pipeline to gate PRs on compliance evidence gaps"
  - "Compliance officer receiving PDF evidence readiness report before an enterprise security review"
  - "Legal team using SARIF output to track assertion gaps in GitHub Code Scanning"
  - "AI provider preparing a compliance evidence bundle for a notified body or regulator"

identified_risks:
  - "Legal misuse — output misinterpreted as legal certification (mitigated by mandatory disclaimer)"
  - "Assertion error — incorrect legal interpretation leads to false evidence readiness signal"
  - "Supply chain — compromised npm dependency exfiltrates user documents"
  - "PII exposure — user documents containing PII processed in CI environments with log retention"

mitigation_measures:
  - "Mandatory regulatory disclaimer on all output surfaces (console, JSON, PDF, SARIF)"
  - "External legal counsel review of assertion library (SCT-0.5, target 2026-07-10)"
  - "bun audit + Dependabot on every release; Sigstore npm provenance attestation"
  - "Secrets/PII redaction applied at evidence collection time (P2.11)"

review_date: "2026-05-10"
review_cycle: annual
