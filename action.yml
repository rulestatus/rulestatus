name: "Rulestatus AI Compliance Check"
description: "Run EU AI Act and other AI regulation compliance tests in CI/CD"
author: "Rulestatus"
branding:
  icon: shield
  color: blue

inputs:
  frameworks:
    description: "Comma-separated list of frameworks to run (e.g. eu-ai-act)"
    required: false
    default: "eu-ai-act"
  severity-gate:
    description: "Fail CI if any result at this severity or above fails"
    required: false
    default: "critical"
  report-format:
    description: "Output format(s): console, json, sarif, pdf, badge, junit, annotations"
    required: false
    default: "sarif"
  annotate-pr:
    description: "Post rule failures as PR annotations and step summary (::error/::warning workflow commands)"
    required: false
    default: "true"
  config-path:
    description: "Path to .rulestatus.yaml config file"
    required: false
    default: ""
  output-dir:
    description: "Directory for report output files"
    required: false
    default: "compliance-reports"
  upload-artifacts:
    description: "Upload report files as a retained GitHub Actions artifact"
    required: false
    default: "true"
  retention-days:
    description: "Number of days to retain the uploaded artifact"
    required: false
    default: "365"
  attest:
    description: "Cryptographically sign the bundle using Sigstore via gh CLI (requires id_token: write permission)"
    required: false
    default: "false"

outputs:
  sarif-file:
    description: "Path to first SARIF output file (if sarif format selected)"
    value: ${{ steps.run.outputs.sarif-file }}
  report-dir:
    description: "Path to report output directory"
    value: ${{ steps.run.outputs.report-dir }}
  artifact-url:
    description: "URL of the uploaded GitHub Actions artifact (if upload-artifacts is true)"
    value: ${{ steps.upload.outputs.artifact-url }}

runs:
  using: "composite"
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies and build Rulestatus
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        bun install --frozen-lockfile
        bun build

    - name: Run compliance checks
      id: run
      shell: bash
      run: |
        FORMATS="${{ inputs.report-format }}"
        if [ "${{ inputs.annotate-pr }}" == "true" ]; then
          FORMATS="${FORMATS},annotations"
        fi

        BASE_ARGS="--format ${FORMATS} --output ${{ inputs.output-dir }}"

        if [ -n "${{ inputs.config-path }}" ]; then
          BASE_ARGS="$BASE_ARGS --config ${{ inputs.config-path }}"
        fi

        RULESTATUS="node ${{ github.action_path }}/packages/cli/dist/rulestatus.js"

        EXIT_CODE=0
        IFS=',' read -ra FWS <<< "${{ inputs.frameworks }}"
        for fw in "${FWS[@]}"; do
          fw=$(echo "$fw" | xargs)
          $RULESTATUS run $BASE_ARGS --framework "$fw" || EXIT_CODE=$?
        done

        SARIF_FILE=$(ls "${{ inputs.output-dir }}"/*.sarif 2>/dev/null | head -1)
        echo "sarif-file=${SARIF_FILE}" >> $GITHUB_OUTPUT
        echo "report-dir=${{ inputs.output-dir }}" >> $GITHUB_OUTPUT

        exit ${EXIT_CODE:-0}

    - name: Upload evidence reports
      id: upload
      if: ${{ inputs.upload-artifacts == 'true' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: rulestatus-evidence-${{ github.sha }}
        path: ${{ inputs.output-dir }}/
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn

    - name: Bundle and attest compliance artifacts
      if: ${{ inputs.attest == 'true' && always() }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        RULESTATUS="node ${{ github.action_path }}/packages/cli/dist/rulestatus.js"
        BUNDLE=$($RULESTATUS bundle --output "${{ inputs.output-dir }}/bundle-${{ github.sha }}.tar.gz" 2>&1 | grep 'Bundle:' | awk '{print $2}')
        if [ -n "$BUNDLE" ] && [ -f "$BUNDLE" ]; then
          $RULESTATUS attest "$BUNDLE" --provider github
        else
          echo "  Warning: bundle not found, attesting JSON reports individually"
          for f in "${{ inputs.output-dir }}"/*.json; do
            [ -f "$f" ] && $RULESTATUS attest "$f" --provider github
          done
        fi
